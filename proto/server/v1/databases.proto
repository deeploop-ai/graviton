syntax = "proto3";

package fleet.server.v1;

option go_package = "github.com/deeploop-ai/fleet/genproto/server/v1;serverv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "shared/v1/authz.proto";
import "shared/v1/common.proto";

service DatabasesService {
  option (fleet.shared.v1.service_auth) = { default_access: ACCESS_API_KEY };

  rpc CreateDatabase(CreateDatabaseRequest) returns (Database) {
    option (google.api.http) = { post: "/v1/server/databases", body: "*" };
  }

  rpc ListDatabases(shared.v1.ListRequest) returns (ListDatabasesResponse) {
    option (google.api.http) = { get: "/v1/server/databases" };
  }

  rpc GetDatabase(GetDatabaseRequest) returns (Database) {
    option (google.api.http) = { get: "/v1/server/databases/{id}" };
  }

  rpc DeleteDatabase(GetDatabaseRequest) returns (shared.v1.Empty) {
    option (google.api.http) = { delete: "/v1/server/databases/{id}" };
  }

  rpc CreateCollection(CreateCollectionRequest) returns (Collection) {
    option (google.api.http) = { post: "/v1/server/databases/{database_id}/collections", body: "*" };
  }

  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse) {
    option (google.api.http) = { get: "/v1/server/databases/{database_id}/collections" };
  }

  rpc GetCollection(GetCollectionRequest) returns (Collection) {
    option (google.api.http) = { get: "/v1/server/databases/{database_id}/collections/{collection_id}" };
  }

  rpc DeleteCollection(GetCollectionRequest) returns (shared.v1.Empty) {
    option (google.api.http) = { delete: "/v1/server/databases/{database_id}/collections/{collection_id}" };
  }

  rpc UpdateCollection(UpdateCollectionRequest) returns (Collection) {
    option (google.api.http) = { patch: "/v1/server/databases/{database_id}/collections/{collection_id}", body: "*" };
  }

  rpc CreateAttribute(CreateAttributeRequest) returns (Attribute) {
    option (google.api.http) = { post: "/v1/server/databases/{database_id}/collections/{collection_id}/attributes", body: "*" };
  }

  rpc CreateIndex(CreateIndexRequest) returns (Index) {
    option (google.api.http) = { post: "/v1/server/databases/{database_id}/collections/{collection_id}/indexes", body: "*" };
  }

  rpc CreateDocument(CreateDocumentRequest) returns (Document) {
    option (google.api.http) = { post: "/v1/server/databases/{database_id}/collections/{collection_id}/documents", body: "*" };
  }

  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse) {
    option (google.api.http) = { get: "/v1/server/databases/{database_id}/collections/{collection_id}/documents" };
  }

  rpc GetDocument(GetDocumentRequest) returns (Document) {
    option (google.api.http) = { get: "/v1/server/databases/{database_id}/collections/{collection_id}/documents/{document_id}" };
  }

  rpc UpdateDocument(UpdateDocumentRequest) returns (Document) {
    option (google.api.http) = { patch: "/v1/server/databases/{database_id}/collections/{collection_id}/documents/{document_id}", body: "*" };
  }

  rpc DeleteDocument(GetDocumentRequest) returns (shared.v1.Empty) {
    option (google.api.http) = { delete: "/v1/server/databases/{database_id}/collections/{collection_id}/documents/{document_id}" };
  }

  rpc CountDocuments(ListDocumentsRequest) returns (CountDocumentsResponse) {
    option (google.api.http) = { get: "/v1/server/databases/{database_id}/collections/{collection_id}/documents/count" };
  }
}

message CreateDatabaseRequest {
  string id = 1;
  string name = 2;
}

message GetDatabaseRequest {
  string id = 1;
}

message ListDatabasesResponse {
  repeated Database databases = 1;
  shared.v1.ListResponseMeta meta = 2;
}

message Database {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message CreateCollectionRequest {
  string database_id = 1;
  string id = 2;
  string name = 3;
  repeated string permissions = 4;
}

message ListCollectionsRequest {
  string database_id = 1;
  repeated string queries = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message GetCollectionRequest {
  string database_id = 1;
  string collection_id = 2;
}

message UpdateCollectionRequest {
  string database_id = 1;
  string collection_id = 2;
  string name = 3;
  repeated string permissions = 4;
}

message ListCollectionsResponse {
  repeated Collection collections = 1;
  shared.v1.ListResponseMeta meta = 2;
}

message Collection {
  string id = 1;
  string database_id = 2;
  string name = 3;
  repeated string permissions = 4;
  repeated Attribute attributes = 5;
  repeated Index indexes = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message CreateAttributeRequest {
  string database_id = 1;
  string collection_id = 2;
  string key = 3;
  string type = 4;
  int32 size = 5;
  bool required = 6;
  bool array = 7;
  string default_value = 8;
}

message Attribute {
  string id = 1;
  string key = 2;
  string type = 3;
  int32 size = 4;
  bool required = 5;
  bool array = 6;
  string default_value = 7;
}

message CreateIndexRequest {
  string database_id = 1;
  string collection_id = 2;
  string id = 3;
  string type = 4;
  repeated string attributes = 5;
  repeated string orders = 6;
}

message Index {
  string id = 1;
  string type = 2;
  repeated string attributes = 3;
  repeated string orders = 4;
}

message Document {
  string id = 1;
  google.protobuf.Struct data = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message CreateDocumentRequest {
  string database_id = 1;
  string collection_id = 2;
  string document_id = 3;
  google.protobuf.Struct data = 4;
  repeated string permissions = 5;
}

message UpdateDocumentRequest {
  string database_id = 1;
  string collection_id = 2;
  string document_id = 3;
  google.protobuf.Struct data = 4;
}

message GetDocumentRequest {
  string database_id = 1;
  string collection_id = 2;
  string document_id = 3;
}

message ListDocumentsRequest {
  string database_id = 1;
  string collection_id = 2;
  repeated string queries = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListDocumentsResponse {
  repeated Document documents = 1;
  shared.v1.ListResponseMeta meta = 2;
}

message CountDocumentsResponse {
  int64 count = 1;
}
