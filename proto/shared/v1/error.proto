syntax = "proto3";

package graviton.shared.v1;

option go_package = "github.com/deeploop-ai/graviton/genproto/shared/v1;sharedv1";

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_REQUEST = 1;
  ERROR_CODE_RESOURCE_NOT_FOUND = 2;
  ERROR_CODE_INVALID_CREDENTIALS = 3;
  ERROR_CODE_PERMISSION_DENIED = 4;
  ERROR_CODE_RESOURCE_CONFLICT = 5;
  ERROR_CODE_QUOTA_EXCEEDED = 6;
  ERROR_CODE_PRECONDITION_FAILED = 7;
  ERROR_CODE_CONCURRENT_MODIFICATION = 8;
  ERROR_CODE_VALUE_OUT_OF_RANGE = 9;
  ERROR_CODE_OPERATION_NOT_ALLOWED = 10;
  ERROR_CODE_INTERNAL_ERROR = 11;
  ERROR_CODE_SERVICE_UNAVAILABLE = 12;
  ERROR_CODE_TIMEOUT = 13;
}

message Error {
  string type = 1;
  string code = 2;
  string message = 3;
  string error_id = 4;
  ErrorCode error_code = 5;
}

message ErrorResponse {
  Error error = 1;
}
