syntax = "proto3";

package orionid.client.v1;

option go_package = "github.com/deeploop-ai/orionid/genproto/client/v1;clientv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "shared/v1/authz.proto";
import "shared/v1/common.proto";

service AccountService {
  option (orionid.shared.v1.service_auth) = { default_access: ACCESS_AUTHENTICATED };

  rpc SignUp(SignUpRequest) returns (SignUpResponse) {
    option (google.api.http) = { post: "/v1/account/sign-up", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc SignIn(SignInRequest) returns (SignInResponse) {
    option (google.api.http) = { post: "/v1/account/sign-in", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc SignOut(SignOutRequest) returns (shared.v1.Empty) {
    option (google.api.http) = { post: "/v1/account/sign-out", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = { post: "/v1/account/refresh", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc Me(MeRequest) returns (Account) {
    option (google.api.http) = { get: "/v1/account/me" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc UpdateAccount(UpdateAccountRequest) returns (Account) {
    option (google.api.http) = { patch: "/v1/account", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {
    option (google.api.http) = { get: "/v1/account/sessions" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc DeleteSession(DeleteSessionRequest) returns (shared.v1.Empty) {
    option (google.api.http) = { delete: "/v1/account/sessions/{session_id}" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc DeleteSessions(DeleteSessionsRequest) returns (shared.v1.Empty) {
    option (google.api.http) = { delete: "/v1/account/sessions" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc GetPrefs(GetPrefsRequest) returns (GetPrefsResponse) {
    option (google.api.http) = { get: "/v1/account/prefs" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc UpdatePrefs(UpdatePrefsRequest) returns (GetPrefsResponse) {
    option (google.api.http) = { put: "/v1/account/prefs", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PERMISSION, permissions: ["users"] };
  }

  rpc CreateEmailOTP(CreateEmailOTPRequest) returns (ChallengeResponse) {
    option (google.api.http) = { post: "/v1/account/sessions/email-otp", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc CreateEmailOTPSession(CreateEmailOTPSessionRequest) returns (SignInResponse) {
    option (google.api.http) = { post: "/v1/account/sessions/email-otp/verify", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc CreateOAuth2Session(CreateOAuth2SessionRequest) returns (CreateOAuth2SessionResponse) {
    option (google.api.http) = { get: "/v1/account/sessions/oauth2/{provider}" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc CreateOAuth2TokenSession(CreateOAuth2TokenSessionRequest) returns (SignInResponse) {
    option (google.api.http) = { post: "/v1/account/sessions/oauth2/{provider}/token", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc CreatePhoneOTP(CreatePhoneOTPRequest) returns (ChallengeResponse) {
    option (google.api.http) = { post: "/v1/account/sessions/phone-otp", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }

  rpc CreatePhoneOTPSession(CreatePhoneOTPSessionRequest) returns (SignInResponse) {
    option (google.api.http) = { post: "/v1/account/sessions/phone-otp/verify", body: "*" };
    option (orionid.shared.v1.method_auth) = { access: ACCESS_PUBLIC };
  }
}

message SignUpRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  string project_id = 4;
}

message SignInRequest {
  string email = 1;
  string password = 2;
  string project_id = 3;
}

message SignOutRequest {
  string project_id = 1;
}

message MeRequest {
  string project_id = 1;
}

message Account {
  string id = 1;
  string email = 2;
  string name = 3;
  string status = 4;
  bool email_verified = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message TokenBundle {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message SignUpResponse {
  Account account = 1;
  TokenBundle tokens = 2;
}

message SignInResponse {
  Account account = 1;
  TokenBundle tokens = 2;
}

message RefreshTokenRequest {
  string project_id = 1;
  string refresh_token = 2;
}

message RefreshTokenResponse {
  TokenBundle tokens = 1;
}

message UpdateAccountRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string old_password = 4;
}

message Session {
  string id = 1;
  string user_id = 2;
  string provider = 3;
  string user_agent = 4;
  string ip = 5;
  google.protobuf.Timestamp expire_at = 6;
  google.protobuf.Timestamp created_at = 7;
  bool current = 8;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message DeleteSessionRequest {
  string session_id = 1;
}

message DeleteSessionsRequest {
  bool keep_current = 1;
}

message GetPrefsRequest {}

message GetPrefsResponse {
  google.protobuf.Struct prefs = 1;
}

message UpdatePrefsRequest {
  google.protobuf.Struct prefs = 1;
}

message CreateEmailOTPRequest {
  string project_id = 1;
  string email = 2;
}

message CreateEmailOTPSessionRequest {
  string project_id = 1;
  string email = 2;
  string challenge_id = 3;
  string otp = 4;
}

message ChallengeResponse {
  string challenge_id = 1;
  int64 expire_at = 2;
}

message CreateOAuth2SessionRequest {
  string provider = 1;
  string project_id = 2;
  string success = 3;
  string failure = 4;
}

message CreateOAuth2SessionResponse {
  string redirect_url = 1;
}

message CreateOAuth2TokenSessionRequest {
  string provider = 1;
  string project_id = 2;
  string success = 3;
  string failure = 4;
  string code = 5;
  string state = 6;
}

message CreatePhoneOTPRequest {
  string project_id = 1;
  string phone = 2;
}

message CreatePhoneOTPSessionRequest {
  string project_id = 1;
  string phone = 2;
  string challenge_id = 3;
  string otp = 4;
}
