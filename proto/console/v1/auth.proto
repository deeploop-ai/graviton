syntax = "proto3";

package fleet.console.v1;

option go_package = "github.com/deeploop-ai/fleet/genproto/console/v1;consolev1";

import "google/api/annotations.proto";
import "shared/v1/authz.proto";

service ConsoleAuthService {
  option (fleet.shared.v1.service_auth) = { default_access: ACCESS_PUBLIC };

  rpc SignIn(SignInRequest) returns (SignInResponse) {
    option (google.api.http) = { post: "/v1/console/auth/sign-in", body: "*" };
  }
}

message SignInRequest {
  string email = 1;
  string password = 2;
}

message SignInResponse {
  string access_token = 1;
  int64 expires_at = 2;
}
